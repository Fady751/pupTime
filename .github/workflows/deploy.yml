name: Deploy Backend to GCP

on:
  push:
    branches:
      - main
    paths:
      - 'Backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: SSH into VM, Pull Code, Migrate, and Reload Systemd
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.GCP_VM_IP }}
          username: ${{ secrets.GCP_VM_USERNAME }}
          key: ${{ secrets.GCP_SSH_PRIVATE_KEY }}
          script: |
            set -e
            echo "Navigating to the Backend directory..."
            # Using the correct case-sensitive path
            cd ~/pupTime/Backend
            
            echo "Pulling latest code from main..."
            git pull origin main
            
            echo "Installing dependencies using venv pip..."
            # Using the direct path to pip ensures we stay inside the virtual environment
            ./venv/bin/pip install -r requirements.txt
            
            echo "Applying database migrations..."
            ./venv/bin/python manage.py migrate
            
            echo "Restarting the systemd service..."
            # Restarting the service we created earlier
            sudo systemctl restart puptime
            
            echo "Deployment successful!"