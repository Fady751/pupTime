name: Android Release Build

on:
  push:
    branches:
      - main
    paths:
      - 'frontEnd/**'
  workflow_dispatch: 

permissions:
  contents: write 

jobs:
  build:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontEnd/pupTime

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install Dependencies
        run: |
          if [ -f "package-lock.json" ]; then
            npm ci
          else
            npm install
          fi

      - name: Create .env file
        run: |
          echo "API_URL=${{ secrets.API_URL }}" >> .env
          echo "googleWebClientId=${{ secrets.GOOGLE_WEB_CLIENT_ID }}" >> .env
          echo "DATABASE_NAME=${{ secrets.DATABASE_NAME }}" >> .env

      - name: Build Android Release
        run: |
          cd android
          chmod +x gradlew
          ./gradlew clean
          ./gradlew assembleRelease --stacktrace

      - name: Upload Artifact (Backup)
        uses: actions/upload-artifact@v4
        with:
          name: app-release-apk
          path: frontEnd/pupTime/android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Update Latest Release Shortcut
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "Latest Android Build"
          body: "This release contains the most recent APK from the main branch."
          files: frontEnd/pupTime/android/app/build/outputs/apk/release/app-release.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}