<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Django Emotion AI</title>
    <style>
        body { font-family: sans-serif; text-align: center; padding: 50px; background: #1a1a1a; color: white; }
        .btn { padding: 15px 30px; font-size: 18px; cursor: pointer; border-radius: 8px; border: none; margin: 10px; transition: 0.3s; }
        #recordBtn { background: #e74c3c; color: white; }
        #stopBtn { background: #95a5a6; display: none; }
        #result { margin-top: 30px; font-size: 22px; color: #2ecc71; font-weight: bold; }
    </style>
</head>
<body>
    <h1>Live Emotion Analysis - Django</h1>
    <button id="recordBtn" class="btn">Start talking</button>
    <button id="stopBtn" class="btn">Stop & analyze</button>
    <div id="result"></div>

    <script>
        let mediaRecorder;
        let audioChunks = [];

        document.getElementById('recordBtn').onclick = async () => {
            const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.start();
            audioChunks = [];
            
            document.getElementById('recordBtn').style.display = 'none';
            document.getElementById('stopBtn').style.display = 'inline-block';
            document.getElementById('result').innerText = "Listening...";

            mediaRecorder.ondataavailable = event => audioChunks.push(event.data);
            mediaRecorder.onstop = async () => {
                const audioBlob = new Blob(audioChunks, { type: 'audio/wav' });
                const formData = new FormData();
                formData.append('file', audioBlob, 'rec.wav');

                document.getElementById('result').innerText = "Analyzing...";

                const response = await fetch('analyze/', {
                    method: 'POST',
                    body: formData,
                    headers: { 'X-CSRFToken': '{{ csrf_token }}' }
                });
                const data = await response.json();
                const res = data.emotions[0];
                document.getElementById('result').innerText = `Result: ${res.label} (${Math.round(res.score * 100)}%)`;
                
                document.getElementById('recordBtn').style.display = 'inline-block';
                document.getElementById('stopBtn').style.display = 'none';
            };
        };
        document.getElementById('stopBtn').onclick = () => mediaRecorder.stop();
    </script>
</body>
</html>
